<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="auto">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b10" />
      <stop offset="50%" stop-color="#12131e" />
      <stop offset="100%" stop-color="#07080c" />
    </linearGradient>

    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a2be2" />
      <stop offset="50%" stop-color="#da70d6" />
      <stop offset="100%" stop-color="#00ffff" />
    </linearGradient>

    <!-- Flow Gradient -->
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a2be2" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0.8" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Animated Neural Trajectory Grid / Flow Matching Lines -->
  <g opacity="0.35">
    <!-- Line 1 -->
    <path d="M -50 200 C 300 50, 400 350, 1250 200" fill="none" stroke="url(#flowGrad)" stroke-width="2" />
    <!-- Line 2 -->
    <path d="M -50 220 C 350 100, 450 300, 1250 220" fill="none" stroke="#8a2be2" stroke-width="1.5" stroke-dasharray="10 5" />
    <!-- Line 3 -->
    <path d="M -50 180 C 250 100, 500 250, 1250 180" fill="none" stroke="#00ffff" stroke-width="1" />
  </g>

  <!-- Pulsing Particle along Trajectory -->
  <circle r="6" fill="#00ffff" filter="url(#glow)">
    <animateMotion dur="6s" repeatCount="indefinite" path="M -50 200 C 300 50, 400 350, 1250 200" />
    <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite" />
  </circle>

  <circle r="4" fill="#8a2be2" filter="url(#glow)">
    <animateMotion dur="8s" repeatCount="indefinite" path="M -50 180 C 250 100, 500 250, 1250 180" />
    <animate attributeName="r" values="3;6;3" dur="1.5s" repeatCount="indefinite" />
  </circle>

  <!-- Floating Decorative Nodes -->
  <g filter="url(#glow)">
    <!-- Node 1 -->
    <circle cx="200" cy="100" r="8" fill="#8a2be2">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" />
      <animate attributeName="cy" values="100;110;100" dur="5s" repeatCount="indefinite" />
    </circle>
    <!-- Node 2 -->
    <circle cx="1000" cy="300" r="10" fill="#00ffff">
      <animate attributeName="opacity" values="1;0.3;1" dur="4s" repeatCount="indefinite" />
      <animate attributeName="cy" values="300;290;300" dur="6s" repeatCount="indefinite" />
    </circle>
    <!-- Node 3 -->
    <circle cx="850" cy="80" r="6" fill="#da70d6">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.5s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Main Typography -->
  <g text-anchor="middle" font-family="'Outfit', 'Inter', -apple-system, sans-serif">
    <!-- Subtitle / Topic -->
    <text x="600" y="140" fill="#da70d6" font-size="20" font-weight="600" letter-spacing="8" opacity="0.8">
      THE ULTIMATE COMPENDIUM
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4s" repeatCount="indefinite" />
    </text>

    <!-- Main Title -->
    <text x="600" y="210" fill="url(#textGrad)" font-size="52" font-weight="800" letter-spacing="4" filter="url(#glow)">
      Awesome Classifier-Free Guidance
    </text>

    <!-- Description -->
    <text x="600" y="260" fill="#a0a5c0" font-size="16" font-weight="400" letter-spacing="2">
      Steering Generative Models: From External Classifiers to Flow Matching
    </text>
  </g>

  <!-- Dynamic Scanline/Grid Overlay -->
  <g opacity="0.05">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1" />
    </pattern>
    <rect width="100%" height="100%" fill="url(#grid)" />
  </g>
</svg>
